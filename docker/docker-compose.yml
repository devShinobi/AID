services:
  postgres:
    image: postgres:16-alpine
    container_name: aid_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-aid}
      POSTGRES_USER: ${DB_USER:-aid_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aid_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aid_user} -d ${DB_DATABASE:-aid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:11.3.2
    container_name: aid_directus
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8055:8055"
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    environment:
      SECRET: ${DIRECTUS_SECRET:-changeme-use-strong-secret-in-prod}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-admin123}

      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-aid}
      DB_USER: ${DB_USER:-aid_user}
      DB_PASSWORD: ${DB_PASSWORD:-aid_password}

      CORS_ENABLED: "true"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4321}

      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}

      # Increase limits for file uploads (logos, screenshots)
      MAX_PAYLOAD_SIZE: "10mb"
      FILES_MAX_UPLOAD_SIZE: "10mb"

volumes:
  postgres_data:
  directus_uploads:
  directus_extensions:
